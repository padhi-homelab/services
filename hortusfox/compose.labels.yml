services:
  hortusfox:
    labels:
    - "traefik.enable=true"
    - "traefik.http.services.${HORTUSFOX_TRAEFIK_NAMESPACE:?}.loadBalancer.server.port=80"
    #
    # FIXME: Serving hortusfox behind a subpath is not supported, yet.
    #        See https://github.com/danielbrendel/hortusfox-web/issues/506
    #
    - "traefik.http.routers.${HORTUSFOX_TRAEFIK_NAMESPACE:?}.rule=Host(`${SERVER_WAN_FQDN:?}`)"
    - "traefik.http.routers.${HORTUSFOX_TRAEFIK_NAMESPACE:?}.entryPoints=wan-https-service-exclusive"
